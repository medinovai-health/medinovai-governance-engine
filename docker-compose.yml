# Local stack: governance PostgreSQL 15 + FastAPI + Temporal + UI.
# Governance DB on host 5434; Temporal Postgres on 5433 (both PostgreSQL 15).

services:
  governance-postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: governance
      POSTGRES_PASSWORD: governance
      POSTGRES_DB: governance
    ports:
      - "5434:5432"
    volumes:
      - governance_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U governance"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgresql:
    image: postgres:15-alpine
    environment:
      POSTGRES_PASSWORD: temporal
      POSTGRES_USER: temporal
    ports:
      - "5433:5432"
    volumes:
      - temporal_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.24.2
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgresql
    ports:
      - "7233:7233"

  temporal-ui:
    image: temporalio/ui:2.31.2
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    ports:
      - "8088:8080"

  governance-api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      governance-postgres:
        condition: service_healthy
      temporal:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://governance:governance@governance-postgres:5432/governance
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      EVIDENCE_STORE_URL: ""
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  governance-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "temporal_worker.py"]
    working_dir: /app/src
    environment:
      DATABASE_URL: postgresql+asyncpg://governance:governance@governance-postgres:5432/governance
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
    depends_on:
      governance-postgres:
        condition: service_healthy
      temporal:
        condition: service_started
      governance-api:
        condition: service_healthy

volumes:
  temporal_pg_data:
  governance_pg_data:
